<!DOCTYPE html>
<html>
<head>
    <title>ร้านอาหาร</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<h1>🍽 ร้านอาหารของฉัน</h1>

<div class="menu">
    <form method="POST">
        {% for food in foods %}
            <button name="food" value="{{ food.name }}">
                {{ food.name }}
            </button>
        {% endfor %}
    </form>
</div>

{% if selected %}
<div class="detail">
    <h2>{{ selected.name }}</h2>
    <p>{{ selected.description }}</p>
    <small>ประเภท: {{ selected.category() }}</small>
</div>
{% endif %}

</body>
</html>
